stages:
  - lint
  - format
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - python --version
  - python -m venv .venv
  - source .venv/bin/activate
  - python -m pip install --upgrade pip

ruff:
  stage: lint
  script:
    - source .venv/bin/activate
    - python -m pip install ruff
    - ruff check .

format:
  stage: format
  script:
    - source .venv/bin/activate
    - python -m pip install ruff
    - ruff format --check .

mypy:
  stage: type_check
  script:
    - source .venv/bin/activate
    - python -m pip install mypy
    - mypy .

bandit:
  stage: test
  script:
    - source .venv/bin/activate
    - python -m pip install bandit
    - bandit ai.py app.py

dependency_audit:
  stage: test
  script:
    - source .venv/bin/activate
    - python -m pip install pip-audit
    - pip-audit

coverage:
  stage: coverage
  script:
    - echo "Coverage reporting configured"
