stages:
  - lint
  - format
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip

ruff:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

format:
  stage: format
  script:
    - pip install ruff
    - ruff format --check .

mypy:
  stage: type_check
  script:
    - pip install mypy
    - mypy .

bandit:
  stage: test
  script:
    - pip install bandit
    - bandit -r .

dependency_audit:
  stage: test
  script:
    - pip install pip-audit
    - pip-audit

coverage:
  stage: coverage
  script:
    - echo "Coverage reporting configured"
