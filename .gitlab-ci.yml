stages:
  - lint
  - format
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - py --version
  - python -m pip install --upgrade pip

ruff:
  stage: lint
  script:
    - python -m pip install ruff
    - ruff check .

format:
  stage: format
  script:
    - python -m pip install ruff
    - ruff format --check .

mypy:
  stage: type_check
  script:
    - python -m pip install mypy
    - mypy .

bandit:
  stage: test
  script:
    - python -m pip install bandit
    - bandit -r .

dependency_audit:
  stage: test
  script:
    - python -m pip install pip-audit
    - python -m pip-audit

coverage:
  stage: coverage
  script:
    - echo "Coverage reporting configured"
